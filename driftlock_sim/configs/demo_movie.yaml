seed: 2025
sample_rate_hz: 5.0e6
duration_s: 0.050

tx:
  df_hz: 10000.0
  m_carriers: 5
  omit_fundamental: true
  amplitudes: equal         # equal|hann|taylor
  phase_schedule: newman    # none|newman
  payload_qpsk_fraction: 0.125
  payload_symbol_rate: 1000.0

channel:
  awgn_snr_db: 20.0
  taps:
    - { delay_s: 0.0e-6, gain: 1.0 }
  cfo_hz: 0.0
  sco_ppm: 0.0
  phase_noise_rad2: 0.0
  rapp_p: 2.0
  rapp_sat: 1.5
  aperture_alpha: 2.0
  aperture_mix: 0.3
  cyclo_gate_rate_hz: 0.0

truth:
  tau_s: 100e-12

movie:
  fps: 24
  seconds: 6
  annotate: true

output:
  dir: driftlock_sim/outputs
  run_id: demo
